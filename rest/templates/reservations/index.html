{% extends "base.html" %}
{% block content %}
<h1 class="mt-4">Reservaciones / Ordenes</h1>

<p class="text-muted">Tipo de negocio: {{ business_type }}</p>

{% if items %}
<ul class="list-group">
  {% for item in items %}
  <li class="list-group-item">{{ item }}</li>
  {% endfor %}
</ul>
{% else %}
<p class="alert alert-info">No hay registros aun.</p>
{% endif %}

<a href="{{ url_for('reservations.create') }}" class="btn btn-primary mt-3">Crear Nuevo</a>
{% endblock %}
