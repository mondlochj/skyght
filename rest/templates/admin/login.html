<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - Skyght</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
    }
    .form-control {
      padding: 0.75rem 1rem;
      border-radius: 8px;
    }
    .btn-admin {
      background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
      border: none;
      padding: 0.75rem;
      font-weight: 500;
    }
    .btn-admin:hover {
      background: linear-gradient(135deg, #4338ca 0%, #3730a3 100%);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);">
        <i class="bi bi-shield-lock-fill text-white" style="font-size: 1.75rem;"></i>
      </div>
      <h4 class="mb-1">Panel de Administracion</h4>
      <p class="text-muted small">Acceso exclusivo para administradores</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Usuario</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Contrasena</label>
        <input type="password" name="password" class="form-control" placeholder="********" required>
      </div>
      <button type="submit" class="btn btn-admin btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    <div class="text-center mt-4">
      <a href="{{ url_for('auth.login') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Volver al portal de clientes
      </a>
    </div>
  </div>
</body>
</html>
