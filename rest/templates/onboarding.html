{% extends "base.html" %}
{% block title %}Configura tu Negocio - Skyght Business{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card" style="max-width: 500px;">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);">
        <i class="bi bi-building-fill text-white" style="font-size: 1.75rem;"></i>
      </div>
      <h2 class="mb-1">Configura tu Negocio</h2>
      <p class="text-muted">Cuentanos sobre tu empresa para personalizar tu experiencia</p>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">
          <i class="bi bi-shop me-1"></i>Nombre del Negocio
        </label>
        <input type="text" name="business_name" class="form-control" placeholder="Ej: Restaurante El Buen Sabor" required>
      </div>

      <div class="mb-3">
        <label class="form-label">
          <i class="bi bi-tag me-1"></i>Tipo de Negocio
        </label>
        <select name="business_type" class="form-select" required>
          <option value="restaurant">🍽️ Restaurante</option>
          <option value="hotel">🏨 Hotel / Hospedaje</option>
          <option value="service">🔧 Servicios a domicilio</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label">
          <i class="bi bi-whatsapp me-1"></i>Telefono WhatsApp
        </label>
        <input type="text" name="phone" class="form-control" placeholder="502XXXXXXXX" required>
        <small class="text-muted">Con codigo de pais, sin espacios ni guiones</small>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-arrow-right-circle me-2"></i>Crear Negocio
      </button>
    </form>
  </div>
</div>
{% endblock %}
