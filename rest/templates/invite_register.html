{% extends "base.html" %}
{% block title %}Completar Registro - Skyght Business{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
        <i class="bi bi-person-plus-fill text-white" style="font-size: 1.75rem;"></i>
      </div>
      <h2 class="mb-1">Completar Registro</h2>
      <p class="text-muted">Te han invitado a unirte a <strong>{{ business.business_name }}</strong></p>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">
          <i class="bi bi-envelope me-1"></i>Email
        </label>
        <input type="email" class="form-control" value="{{ email }}" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label">
          <i class="bi bi-person me-1"></i>Nombre completo
        </label>
        <input type="text" name="name" class="form-control" placeholder="Tu nombre completo" required minlength="2">
      </div>
      <div class="mb-3">
        <label class="form-label">
          <i class="bi bi-lock me-1"></i>Contrasena
        </label>
        <input type="password" name="password" class="form-control" placeholder="Minimo 6 caracteres" required minlength="6">
      </div>
      <div class="mb-4">
        <label class="form-label">
          <i class="bi bi-lock-fill me-1"></i>Confirmar contrasena
        </label>
        <input type="password" name="password2" class="form-control" placeholder="Repite tu contrasena" required>
      </div>
      <button type="submit" class="btn btn-success w-100 mb-3">
        <i class="bi bi-check-circle me-2"></i>Crear cuenta y unirme
      </button>
    </form>

    <div class="text-center">
      <span class="text-muted">¿Ya tienes cuenta?</span>
      <a href="{{ url_for('auth.login') }}" class="ms-1 fw-semibold" style="color: #4f46e5; text-decoration: none;">
        Inicia sesion
      </a>
    </div>
  </div>
</div>
{% endblock %}
