{% extends "base.html" %}
{% block content %}
<h1 class="mt-4">Agregar Habitacion</h1>

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Nombre de la habitacion</label>
    <input type="text" name="room_name" class="form-control" placeholder="Ej: Suite 101" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Capacidad (personas)</label>
    <input type="number" name="capacity" class="form-control" min="1" value="2" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Precio por noche</label>
    <input type="number" name="price" class="form-control" min="0" step="0.01" value="0" required>
  </div>
  <button type="submit" class="btn btn-primary">Agregar</button>
  <a href="{{ url_for('hotel.rooms') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
