{% extends "base.html" %}
{% block title %}Nueva Orden - {{ g.current_business.business_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">
          <i class="bi bi-receipt me-2"></i>Nueva Orden
        </h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Mesa</label>
            <select name="table_id" class="form-select">
              <option value="">Sin mesa (para llevar)</option>
              {% for table in tables %}
              <option value="{{ table.id }}" {% if request.args.get('table') == table.id|string %}selected{% endif %}>
                Mesa {{ table.table_number }} ({{ table.capacity }} personas)
                {% if table.status == 'occupied' %} - Ocupada{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Cantidad de comensales</label>
            <input type="number" name="guests_count" class="form-control" value="1" min="1">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-plus-lg me-1"></i>Crear Orden
            </button>
            <a href="{{ url_for('restaurant.orders') }}" class="btn btn-outline-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
