{% extends "base.html" %}
{% block title %}{{ 'Editar' if category else 'Nueva' }} Categoria - {{ g.current_business.business_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">
          <i class="bi bi-folder-plus me-2"></i>
          {{ 'Editar Categoria' if category else 'Nueva Categoria' }}
        </h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required
                   value="{{ category.name if category else '' }}"
                   placeholder="Ej: Entradas, Platos Fuertes, Bebidas">
          </div>
          <div class="mb-3">
            <label class="form-label">Descripcion</label>
            <textarea name="description" class="form-control" rows="3"
                      placeholder="Descripcion opcional de la categoria">{{ category.description if category else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Guardar
            </button>
            <a href="{{ url_for('restaurant.menu') }}" class="btn btn-outline-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
